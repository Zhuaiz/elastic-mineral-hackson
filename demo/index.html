<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>石头记 · 矿物鉴定 · Elastic 融合检索</title>
<style>
  /* 与路演幻灯片同一套"标本柜"设计系统 */
  :root {
    --ground: #0e1a17; --panel: #14241f; --panel-2: #1a2e28;
    --ink: #eaf1ec; --muted: #8aa79b; --faint: #5a6f66;
    --malachite: #1fc98a; --azurite: #4a97d6; --streak: #d8c07f;
    --line: #2a4038; --line-bright: #365046;
    --shadow: 0 20px 50px -20px rgba(0,0,0,.55);
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background:
      radial-gradient(1100px 500px at 85% -10%, color-mix(in oklab, var(--malachite) 7%, transparent), transparent 60%),
      radial-gradient(800px 400px at -10% 110%, color-mix(in oklab, var(--azurite) 6%, transparent), transparent 60%),
      var(--ground);
    color: var(--ink); font: 15px/1.55 -apple-system, "PingFang SC", system-ui, sans-serif;
    padding: clamp(1.2rem, 3vw, 2.5rem); max-width: 1360px; margin: 0 auto; min-height: 100vh; }

  .catalog { font-family: var(--mono); font-size: .7rem; letter-spacing: .14em;
    text-transform: uppercase; color: var(--faint); display: flex; gap: 1rem; }
  .catalog b { color: var(--malachite); font-weight: 600; }
  h1 { font-size: clamp(1.5rem, 3vw, 2.1rem); font-weight: 800; letter-spacing: -.015em; margin-top: .5rem; }
  h1 em { font-style: normal; color: var(--malachite); }
  .sub { color: var(--muted); margin: .35rem 0 1.6rem; max-width: 62ch; }
  .sub b { color: var(--ink); }

  /* 控制台 */
  .controls { display: grid; grid-template-columns: minmax(280px, 5fr) minmax(300px, 7fr); gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 880px) { .controls { grid-template-columns: 1fr; } }
  .drop { border: 1.5px dashed var(--line-bright); border-radius: 16px; padding: 1rem;
    background: var(--panel); cursor: pointer; transition: border-color .2s, transform .2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .5rem;
    text-align: center; min-height: 168px; }
  .drop.hover { border-color: var(--malachite); transform: scale(1.01); }
  .drop img { max-height: 150px; border-radius: 10px; box-shadow: var(--shadow); }
  .drop .hint { color: var(--faint); font-size: .8rem; font-family: var(--mono); letter-spacing: .04em; }
  .side { display: flex; flex-direction: column; gap: .6rem; }
  textarea, input { background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 12px; padding: .7rem .85rem; font: inherit; width: 100%; }
  textarea:focus, input:focus { outline: 2px solid color-mix(in oklab, var(--malachite) 55%, transparent); outline-offset: 1px; }
  textarea { resize: vertical; min-height: 74px; }
  .row { display: flex; gap: .6rem; }
  button.go { background: linear-gradient(135deg, var(--malachite), color-mix(in oklab, var(--malachite) 70%, var(--azurite)));
    color: #08130f; border: 0; border-radius: 12px; padding: .7rem 1.6rem; font-weight: 750;
    cursor: pointer; font-size: 1rem; letter-spacing: .02em; transition: transform .15s; }
  button.go:hover { transform: translateY(-1px); }
  button.go:disabled { opacity: .55; cursor: wait; transform: none; }

  /* 标本抽屉：一键示例 */
  .drawer { margin: .2rem 0 1.4rem; }
  .drawer .lbl { font-family: var(--mono); font-size: .68rem; letter-spacing: .14em;
    text-transform: uppercase; color: var(--faint); margin-bottom: .5rem; }
  .drawer .tray { display: flex; gap: .6rem; flex-wrap: wrap; }
  .chip { display: flex; align-items: center; gap: .5rem; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: .3rem .8rem .3rem .3rem;
    cursor: pointer; transition: border-color .15s, transform .15s; }
  .chip:hover { border-color: var(--malachite); transform: translateY(-2px); }
  .chip img { width: 34px; height: 34px; object-fit: cover; border-radius: 8px; }
  .chip span { font-size: .85rem; font-weight: 600; }
  .chip small { color: var(--faint); font-family: var(--mono); font-size: .65rem; }

  /* 判定横幅 */
  .banner { display: none; align-items: baseline; gap: 1rem; margin-bottom: 1rem;
    padding: .9rem 1.2rem; border-radius: 14px; border: 1.5px solid var(--malachite);
    background: linear-gradient(150deg, var(--panel-2), var(--panel)); box-shadow: var(--shadow); }
  .banner.show { display: flex; animation: rise .45s cubic-bezier(.16,1,.3,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .banner.show { animation: none; } .drop, .chip, button.go { transition: none; } }
  .banner .k { font-family: var(--mono); font-size: .7rem; letter-spacing: .14em;
    text-transform: uppercase; color: var(--malachite); }
  .banner .v { font-size: 1.5rem; font-weight: 800; text-transform: capitalize; }
  .banner .lat { margin-left: auto; font-family: var(--mono); font-size: .72rem; color: var(--faint); }

  /* 三栏赛马 */
  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 880px) { .cols { grid-template-columns: 1fr; } }
  .col { background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 1rem; border-top: 3px solid var(--leg, var(--line)); }
  .col.image { --leg: var(--azurite); }
  .col.text  { --leg: var(--streak); }
  .col.rrf   { --leg: var(--malachite); border-color: var(--malachite);
    background: linear-gradient(165deg, var(--panel-2), var(--panel)); box-shadow: var(--shadow); }
  .col h2 { font-family: var(--mono); font-size: .72rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--muted); display: flex; justify-content: space-between;
    align-items: center; margin-bottom: .7rem; }
  .col.rrf h2 { color: var(--malachite); }
  .tag { font-size: .62rem; background: var(--malachite); color: #08130f;
    padding: .12rem .5rem; border-radius: 999px; font-weight: 800; letter-spacing: .05em; }
  .verdict { font-size: 1.2rem; font-weight: 750; margin-bottom: .2rem; text-transform: capitalize;
    display: flex; align-items: center; gap: .5rem; }
  .verdict .mark { font-size: 1rem; }
  .verdict .mark.hit { color: var(--malachite); }
  .verdict .mark.miss { color: var(--faint); }
  .cand { display: flex; gap: .6rem; align-items: center; padding: .45rem 0; border-top: 1px solid var(--line); }
  .cand:first-of-type { border-top: 0; }
  .cand img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; background: var(--panel-2); }
  .cand .name { font-weight: 600; text-transform: capitalize; }
  .cand .meta { color: var(--faint); font-size: .74rem; font-family: var(--mono); }
  .cand .score { margin-left: auto; font-family: var(--mono); font-variant-numeric: tabular-nums;
    color: var(--muted); font-size: .78rem; text-align: right; }
  .cand.winner { background: color-mix(in oklab, var(--malachite) 9%, transparent);
    border-radius: 10px; padding-left: .4rem; padding-right: .4rem; border-top-color: transparent; }
  .cand.winner .name { color: var(--malachite); }
  .cand.winner + .cand { border-top-color: transparent; }
  .empty { color: var(--faint); font-size: .85rem; padding: 1rem 0; font-family: var(--mono); }
  .skel .bar { height: 44px; border-radius: 10px; margin: .45rem 0;
    background: linear-gradient(100deg, var(--panel-2) 40%, var(--line) 50%, var(--panel-2) 60%);
    background-size: 200% 100%; animation: shimmer 1.2s infinite linear; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  @media (prefers-reduced-motion: reduce) { .skel .bar { animation: none; } }

  .foot { color: var(--faint); font-size: .78rem; margin-top: 1.6rem; font-family: var(--mono);
    letter-spacing: .02em; display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
  .foot code { background: var(--panel); padding: .1rem .45rem; border-radius: 6px; color: var(--muted); }
</style>
</head>
<body>
  <div class="catalog"><b>SPECIMEN LAB</b><span>AGENTHACK · BEIJING · 2026</span></div>
  <h1>看一块石头，就说出它是<em>什么矿物</em>。</h1>
  <p class="sub">拖入标本照片，或写下野外观察。三栏赛马：只看图 / 只看字 / <b>RRF 融合</b>——哪一栏先答对，一目了然。</p>

  <div class="controls">
    <label class="drop" id="drop">
      <input type="file" id="file" accept="image/*" hidden>
      <div id="dropInner">
        <div style="font-size:2.2rem">🪨</div>
        <div>点击 / 拖入 / ⌘V 粘贴标本照片</div>
        <div class="hint">image → jina-clip-v2 → 1024d kNN</div>
      </div>
    </label>
    <div class="side">
      <textarea id="text" placeholder="野外观察（可选）：如 green banded; light green streak; hardness 4"></textarea>
      <div class="row">
        <input id="hardness" type="number" step="0.5" placeholder="莫氏硬度（可选 · RRF 栏结构化过滤）" style="flex:1">
        <button class="go" id="go">鉴定</button>
      </div>
    </div>
  </div>

  <div class="drawer">
    <div class="lbl">标本抽屉 · 一键上台</div>
    <div class="tray" id="tray"></div>
  </div>

  <div class="banner" id="banner">
    <span class="k">RRF 融合判定</span>
    <span class="v" id="bannerSpecies">—</span>
    <span class="lat" id="bannerLat"></span>
  </div>

  <div class="cols" id="cols"></div>

  <p class="foot">
    <code>阿里云 Elasticsearch 9.3.2</code><code>retriever.rrf = BM25 + 图像kNN + 硬度过滤</code>
    <code>jina-clip-v2 图文同空间</code><code>5,498 标本向量 · 98 种</code>
  </p>

<script>
const $ = id => document.getElementById(id);
let imageData = null;
const drop = $('drop'), fileInput = $('file');

drop.addEventListener('click', () => fileInput.click());
['dragover','dragenter'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('hover'); }));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('hover'); }));
drop.addEventListener('drop', ev => { const f = ev.dataTransfer.files[0]; if (f) loadFile(f); });
fileInput.addEventListener('change', ev => { const f = ev.target.files[0]; if (f) loadFile(f); });
document.addEventListener('paste', ev => {
  const item = [...(ev.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (item) loadFile(item.getAsFile());
});

function setImage(dataUrl) {
  imageData = dataUrl;
  $('dropInner').innerHTML = `<img src="${dataUrl}" alt="query"><div class="hint">已载入 · 点击更换</div>`;
}
function loadFile(f) {
  const reader = new FileReader();
  reader.onload = e => setImage(e.target.result);
  reader.readAsDataURL(f);
}

/* 标本抽屉：/samples 动态取图，点击即整装（图+观察+硬度）上台 */
fetch('/samples').then(r => r.json()).then(samples => {
  $('tray').innerHTML = samples.map((s, i) => `
    <div class="chip" data-i="${i}">
      <img src="/thumb/${s.thumb}" alt="${s.species}">
      <span>${s.zh}<br><small>${s.species}</small></span>
    </div>`).join('');
  $('tray').addEventListener('click', async ev => {
    const chip = ev.target.closest('.chip'); if (!chip) return;
    const s = samples[+chip.dataset.i];
    const blob = await (await fetch('/thumb/' + s.thumb)).blob();
    const dataUrl = await new Promise(res => {
      const rd = new FileReader(); rd.onload = e => res(e.target.result); rd.readAsDataURL(blob);
    });
    setImage(dataUrl);
    $('text').value = s.text;
    $('hardness').value = s.hardness;
    run();
  });
});

const LABELS = { image: '① 只看图 · 图像 kNN', text: '② 只看字 · BM25', rrf: '③ RRF 融合' };
const SKELETON = ['image','text','rrf'].map(m =>
  `<div class="col ${m} skel"><h2>${LABELS[m]}</h2><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>`).join('');

$('go').addEventListener('click', run);
async function run() {
  const text = $('text').value.trim();
  const hardness = parseFloat($('hardness').value) || null;
  if (!imageData && !text) { alert('请拖入照片或输入属性'); return; }
  $('go').disabled = true; $('go').textContent = '检索中…';
  $('banner').classList.remove('show');
  $('cols').innerHTML = SKELETON;
  const t0 = performance.now();
  try {
    const r = await fetch('/search', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ image: imageData, text, hardness }) });
    const data = await r.json();
    if (data.error) { $('cols').innerHTML = `<div class="empty">出错：${data.error}</div>`; return; }
    render(data.results, (performance.now() - t0) / 1000);
  } catch (e) {
    $('cols').innerHTML = `<div class="empty">请求失败：${e.message}</div>`;
  } finally { $('go').disabled = false; $('go').textContent = '鉴定'; }
}

function render(results, secs) {
  const order = ['image','text','rrf'].filter(m => results[m]);
  const verdict = results.rrf?.[0]?.species || null;
  if (verdict) {
    $('bannerSpecies').textContent = verdict;
    $('bannerLat').textContent = `${secs.toFixed(1)}s · 5,498 向量 · 一次 rrf 查询`;
    $('banner').classList.add('show');
  }
  $('cols').innerHTML = order.map(mode => {
    const cands = results[mode] || [];
    const top = cands[0];
    const isRrf = mode === 'rrf';
    const hit = top && verdict && top.species === verdict;
    const cards = cands.length ? cands.map((c, i) => {
      const isWinner = verdict && c.species === verdict;
      const score = mode === 'text' ? (c.score?.toFixed(1) ?? '') : `${c.votes} 票`;
      return `
      <div class="cand ${isWinner ? 'winner' : ''}">
        ${c.thumb ? `<img loading="lazy" src="/thumb/${c.thumb.replace('data/images/','')}" onerror="this.style.visibility='hidden'">` : '<div style="width:44px"></div>'}
        <div>
          <div class="name">${c.species}</div>
          <div class="meta">${c.crystal_system || '?'} · H ${c.hardness_min ?? '?'}–${c.hardness_max ?? '?'}</div>
        </div>
        <div class="score">${score}${isWinner && i > 0 ? `<br>#${i + 1}` : ''}</div>
      </div>`; }).join('') : '<div class="empty">无结果</div>';
    return `<div class="col ${mode}">
      <h2>${LABELS[mode]} ${isRrf ? '<span class="tag">FUSION</span>' : ''}</h2>
      ${top ? `<div class="verdict"><span class="mark ${hit ? 'hit' : 'miss'}">${hit ? '●' : '○'}</span>${top.species}</div>` : ''}
      ${cards}
    </div>`;
  }).join('');
}
</script>
</body>
</html>
